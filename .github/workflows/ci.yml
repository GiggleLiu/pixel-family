name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4

      - name: Compile manual (test)
        run: typst compile manual.typ manual.pdf

      - name: Render gallery SVG
        run: typst compile --root . --format svg images/render.typ images/gallery.svg

      - name: Upload manual PDF
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: manual
          path: manual.pdf
