name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4

      - name: Compile manual (test)
        run: typst compile manual.typ manual.pdf

      - name: Render character SVGs
        run: typst compile --root . --format svg images/render.typ 'images/render-{0p}.svg'

      - name: Verify all SVGs generated
        run: |
          expected=$(grep -c '#pagebreak()' images/render.typ)
          expected=$((expected + 1))
          count=$(ls images/render-*.svg 2>/dev/null | wc -l)
          echo "Expected $expected SVGs, found $count"
          [ "$count" -eq "$expected" ] || { echo "SVG count mismatch"; exit 1; }

      - name: Upload manual PDF
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: manual
          path: manual.pdf
